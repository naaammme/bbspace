name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.2.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # strip leading 'v' from tag
            NAME=${GITHUB_REF_NAME#v}
          else
            NAME=${{ github.event.inputs.version_name }}
          fi
          # version code = major*10000 + minor*100 + patch
          IFS='.' read -r MAJ MIN PAT <<< "$NAME"
          CODE=$(( MAJ * 10000 + MIN * 100 + (PAT + 0) ))
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "code=$CODE" >> $GITHUB_OUTPUT

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: |
          ./gradlew assembleRelease \
            -PversionName=${{ steps.ver.outputs.name }} \
            -PversionCode=${{ steps.ver.outputs.code }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bbspace-${{ steps.ver.outputs.name }}.apk
          path: app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
