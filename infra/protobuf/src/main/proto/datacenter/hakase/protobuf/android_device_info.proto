syntax = "proto3";

option java_package = "datacenter.hakase.protobuf";

package com.bilibili.datacenter.hakase.protobuf;

// 传感器信息
message SensorInfo {
    string name = 1;          // 传感器名称
    string vendor = 2;        // 供应商
    int32 version = 3;        // 版本
    int32 type = 4;           // 类型
    float max_range = 5;      // 最大量程
    float resolution = 6;     // 分辨率
    float power = 7;          // 功耗
    int32 min_delay = 8;      // 最小延迟
}

// 设备信息
message AndroidDeviceInfo {
    // 基础信息
    string sdkver = 1;                // SDK版本
    string app_id = 2;                // 应用ID
    string app_version = 3;           // 应用版本
    string app_version_code = 4;      // 应用版本号
    string mid = 5;                   // 用户MID
    string chid = 6;                  // 渠道ID
    int64 fts = 7;                    // 首次安装时间戳
    string buvid_local = 8;           // 本地Buvid
    int32 first = 9;                  // 首次启动标志
    string proc = 10;                 // 进程名
    string net = 11;                  // 网络类型
    string band = 12;                 // 频段
    string osver = 13;                // 操作系统版本
    int64 t = 14;                     // 时间戳
    int32 cpu_count = 15;             // CPU核心数
    string model = 16;                // 设备型号
    string brand = 17;                // 品牌
    string screen = 18;               // 屏幕分辨率
    string cpu_model = 19;            // CPU型号
    string btmac = 20;                // 蓝牙MAC地址
    int64 boot = 21;                  // 启动时间
    string emu = 22;                  // 模拟器检测
    string oid = 23;                  // OID
    string network = 24;              // 网络运营商
    int64 mem = 25;                   // 内存大小
    string sensor = 26;               // 传感器信息
    int64 cpu_freq = 27;              // CPU频率
    string cpu_vendor = 28;           // CPU厂商
    string sim = 29;                  // SIM卡信息
    int32 brightness = 30;            // 亮度
    map<string, string> props = 31;   // 系统属性
    map<string, string> sys = 32;     // 系统属性
    string wifimac = 33;              // WiFi MAC地址
    string adid = 34;                 // ADID
    string os = 35;                   // 操作系统
    string imei = 36;                 // IMEI
    string cell = 37;                 // 基站信息
    string imsi = 38;                 // IMSI
    string iccid = 39;                // ICCID
    int32 camcnt = 40;                // 摄像头数量
    string campx = 41;                // 摄像头像素
    int64 total_space = 42;           // 总存储空间
    string axposed = 43;              // Xposed检测
    string maps = 44;                 // 地图信息
    string files = 45;                // 文件信息
    string virtual = 46;              // 虚拟化检测
    string virtualproc = 47;          // 虚拟进程检测
    string gadid = 48;                // GADID
    string glimit = 49;               // OpenGL限制
    string apps = 50;                 // 应用列表
    string guid = 51;                 // GUID
    string uid = 52;                  // UID
    int32 root = 53;                  // Root检测
    string camzoom = 54;              // 摄像头变焦
    string camlight = 55;             // 闪光灯
    string oaid = 56;                 // OAID
    string udid = 57;                 // UDID
    string vaid = 58;                 // VAID
    string aaid = 59;                 // AAID
    string androidapp20 = 60;         // Android应用列表(前20)
    int32 androidappcnt = 61;         // Android应用数量
    string androidsysapp20 = 62;      // 系统应用列表(前20)
    int32 battery = 63;               // 电池电量
    string battery_state = 64;        // 电池状态
    string bssid = 65;                // BSSID
    string build_id = 67;             // Build ID
    string country_iso = 68;          // 国家ISO代码
    int64 free_memory = 70;           // 可用内存
    string fstorage = 71;             // 存储信息
    string kernel_version = 74;       // 内核版本
    string languages = 75;            // 语言
    string mac = 76;                  // MAC地址
    string ssid = 79;                 // SSID
    int32 systemvolume = 80;          // 系统音量
    string wifimaclist = 81;          // WiFi MAC列表
    int64 memory = 82;                // 内存
    string str_battery = 83;          // 电池电量字符串
    bool is_root = 84;                // 是否Root
    string str_brightness = 85;       // 亮度字符串
    string str_app_id = 86;           // 应用ID字符串
    string ip = 87;                   // IP地址
    string user_agent = 88;           // User-Agent
    string light_intensity = 89;      // 光照强度
    repeated float device_angle = 90; // 设备角度
    int64 gps_sensor = 91;            // GPS传感器
    int64 speed_sensor = 92;          // 速度传感器
    int64 linear_speed_sensor = 93;   // 线性速度传感器
    int64 gyroscope_sensor = 94;      // 陀螺仪传感器
    int64 biometric = 95;             // 生物识别
    repeated string biometrics = 96;  // 生物识别列表
    int64 last_dump_ts = 97;          // 上次dump时间戳
    string location = 98;             // 位置
    string country = 99;              // 国家
    string city = 100;                // 城市
    int32 data_activity_state = 101;  // 数据活动状态
    int32 data_connect_state = 102;   // 数据连接状态
    int32 data_network_type = 103;    // 数据网络类型
    int32 voice_network_type = 104;   // 语音网络类型
    int32 voice_service_state = 105;  // 语音服务状态
    int32 usb_connected = 106;        // USB连接状态
    int32 adb_enabled = 107;          // ADB是否启用
    string ui_version = 108;          // UI版本
    repeated string accessibility_service = 109;  // 无障碍服务列表
    repeated SensorInfo sensors_info = 110;       // 传感器信息列表
    string drmid = 111;               // DRM ID
    bool battery_present = 112;       // 电池是否存在
    string battery_technology = 113;  // 电池技术
    int32 battery_temperature = 114;  // 电池温度
    int32 battery_voltage = 115;      // 电池电压
    int32 battery_plugged = 116;      // 充电方式
    int32 battery_health = 117;       // 电池健康状态
    repeated string cpu_abi_list = 118;      // CPU ABI列表
    string cpu_abi_libc = 119;               // CPU ABI libc
    string cpu_abi_libc64 = 120;             // CPU ABI libc64
    string cpu_processor = 121;              // CPU处理器
    string cpu_model_name = 122;             // CPU型号名称
    string cpu_hardware = 123;               // CPU硬件
    string cpu_features = 124;               // CPU特性
    string simulator_attr = 125;             // 模拟器属性
}
