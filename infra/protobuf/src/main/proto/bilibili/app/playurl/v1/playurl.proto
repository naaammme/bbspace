syntax = "proto3";

package bilibili.app.playurl.v1;

option java_multiple_files = true;
option java_package = "com.bapis.bilibili.app.playurl.v1";
option optimize_for = LITE_RUNTIME;

enum Business {
  UNKNOWN = 0;
  STORY = 1;
}

enum ButtonAction {
  BUTTON_UNKNOWN = 0;
  CHARGINGPLUS = 1;
}

enum CodeType {
  NOCODE = 0;
  CODE264 = 1;
  CODE265 = 2;
  CODEAV1 = 3;
}

enum ConfType {
  NoType = 0;
  FLIPCONF = 1;
  CASTCONF = 2;
  FEEDBACK = 3;
  SUBTITLE = 4;
  PLAYBACKRATE = 5;
  TIMEUP = 6;
  PLAYBACKMODE = 7;
  SCALEMODE = 8;
  BACKGROUNDPLAY = 9;
  LIKE = 10;
  DISLIKE = 11;
  COIN = 12;
  ELEC = 13;
  SHARE = 14;
  SCREENSHOT = 15;
  LOCKSCREEN = 16;
  RECOMMEND = 17;
  PLAYBACKSPEED = 18;
  DEFINITION = 19;
  SELECTIONS = 20;
  NEXT = 21;
  EDITDM = 22;
  SMALLWINDOW = 23;
  SHAKE = 24;
  OUTERDM = 25;
  INNERDM = 26;
  PANORAMA = 27;
  DOLBY = 28;
  COLORFILTER = 29;
  LOSSLESS = 30;
}

enum Group {
  UnknownGroup = 0;
  A = 1;
  B = 2;
  C = 3;
}

enum GuideStyle {
  STYLE_UNKNOWN = 0;
  CHARGING_TEXT = 1;
}

enum PlayErr {
  NoErr = 0;
  WithMultiDeviceLoginErr = 1;
}

enum PlayLimitCode {
  PLCUnkown = 0;
  PLCUgcNotPayed = 1;
  PLCChargingPlusNotPass = 2;
  PLCChargingPlusUpgrade = 3;
}

enum ToastType {
  TOAST_TYPE_UNKNOWN = 0;
  CHARGING_TOAST = 1;
}

enum VideoType {
  Unknown = 0;
  FLV = 1;
  DASH = 2;
  MP4 = 3;
}

message AB {
  Glance glance = 1;
  Group group = 2;
}

message ArcConf {
  bool isSupport = 1;
  bool disabled = 2;
  ExtraContent extraContent = 3;
  repeated int64 unsupportScene = 4;
}

message ButtonInfo {
  string text = 1;
  string textColor = 2;
  string textColorNight = 3;
  string bgColor = 4;
  string bgColorNight = 5;
  string link = 6;
  ButtonAction actionType = 7;
  Report report = 8;
  string frameColor = 9;
  string icon = 10;
}

message ButtonStyle {
  string text = 1;
  string textColor = 2;
  string bgColor = 3;
  string jumpLink = 4;
}

message Chronos {
  string md5 = 1;
  string file = 2;
}

message CloudConf {
  bool show = 1;
  ConfType confType = 2;
  FieldValue fieldValue = 3;
  ConfValue confValue = 4;
}

message ComprehensiveToast {
  ToastType type = 1;
  ButtonInfo button = 2;
  string icon = 3;
  TextInfo toastText = 4;
  Report report = 5;
}

message ConfValue {
  oneof value {
    bool switchVal = 1;
    int64 selectedVal = 2;
  }
}

message DashItem {
  uint32 id = 1;
  string baseUrl = 2;
  repeated string backupUrl = 3;
  uint32 bandwidth = 4;
  uint32 codecid = 5;
  string md5 = 6;
  uint64 size = 7;
  string frameRate = 8;
  string widevinePssh = 9;
  string bilidrmUri = 10;
}

message DashVideo {
  string baseUrl = 1;
  repeated string backupUrl = 2;
  uint32 bandwidth = 3;
  uint32 codecid = 4;
  string md5 = 5;
  uint64 size = 6;
  uint32 audioId = 7;
  bool noRexcode = 8;
  string frameRate = 9;
  uint32 width = 10;
  uint32 height = 11;
  string widevinePssh = 12;
  string bilidrmUri = 13;
}

message Dialog {
  GuideStyle styleType = 1;
  Report report = 2;
  TextInfo title = 3;
  TextInfo subtitle = 4;
  repeated ButtonInfo button = 5;
}

message DolbyItem {
  enum Type {
    NONE = 0;
    COMMON = 1;
    ATMOS = 2;
  }

  Type type = 1;
  repeated DashItem audio = 2;
}

message Event {
  Shake shake = 1;
}

message ExtraContent {
  string disabledReason = 1;
  int64 disabledCode = 2;
}

message FieldValue {
  oneof value {
    bool switch = 1;
  }
}

message FormatDescription {
  uint32 quality = 1;
  string format = 2;
  string description = 3;
  string newDescription = 4;
  string displayDesc = 5;
  string superscript = 6;
}

message Glance {
  bool canWatch = 1;
  int64 times = 2;
  int64 duration = 3;
}

message LossLessItem {
  bool isLosslessAudio = 1;
  DashItem audio = 2;
  bool needVip = 3;
}

message MultiDashVideo {
  repeated DashVideo dashVideos = 1;
}

message PlayAbilityConf {
  CloudConf backgroundPlayConf = 1;
  CloudConf flipConf = 2;
  CloudConf castConf = 3;
  CloudConf feedbackConf = 4;
  CloudConf subtitleConf = 5;
  CloudConf playbackRateConf = 6;
  CloudConf timeUpConf = 7;
  CloudConf playbackModeConf = 8;
  CloudConf scaleModeConf = 9;
  CloudConf likeConf = 10;
  CloudConf dislikeConf = 11;
  CloudConf coinConf = 12;
  CloudConf elecConf = 13;
  CloudConf shareConf = 14;
  CloudConf screenShotConf = 15;
  CloudConf lockScreenConf = 16;
  CloudConf recommendConf = 17;
  CloudConf playbackSpeedConf = 18;
  CloudConf definitionConf = 19;
  CloudConf selectionsConf = 20;
  CloudConf nextConf = 21;
  CloudConf editDmConf = 22;
  CloudConf smallWindowConf = 23;
  CloudConf shakeConf = 24;
  CloudConf outerDmConf = 25;
  CloudConf innerDmConf = 26;
  CloudConf panoramaConf = 27;
  CloudConf dolbyConf = 28;
  CloudConf colorFilterConf = 29;
  CloudConf lossLessConf = 30;
}

message PlayArc {
  bool isPreview = 1;
}

message PlayArcConf {
  ArcConf backgroundPlayConf = 1;
  ArcConf flipConf = 2;
  ArcConf castConf = 3;
  ArcConf feedbackConf = 4;
  ArcConf subtitleConf = 5;
  ArcConf playbackRateConf = 6;
  ArcConf timeUpConf = 7;
  ArcConf playbackModeConf = 8;
  ArcConf scaleModeConf = 9;
  ArcConf likeConf = 10;
  ArcConf dislikeConf = 11;
  ArcConf coinConf = 12;
  ArcConf elecConf = 13;
  ArcConf shareConf = 14;
  ArcConf screenShotConf = 15;
  ArcConf lockScreenConf = 16;
  ArcConf recommendConf = 17;
  ArcConf playbackSpeedConf = 18;
  ArcConf definitionConf = 19;
  ArcConf selectionsConf = 20;
  ArcConf nextConf = 21;
  ArcConf editDmConf = 22;
  ArcConf smallWindowConf = 23;
  ArcConf shakeConf = 24;
  ArcConf outerDmConf = 25;
  ArcConf innerDmConf = 26;
  ArcConf panoramaConf = 27;
  ArcConf dolbyConf = 28;
  ArcConf screenRecordingConf = 29;
  ArcConf colorFilterConf = 30;
  ArcConf lossLessConf = 31;
  ArcConf systemRecordConf = 32;
}

message PlayConfEditReply {
}

message PlayConfEditReq {
  repeated PlayConfState playConf = 1;
}

message PlayConfReply {
  PlayAbilityConf playConf = 1;
}

message PlayConfReq {
}

message PlayConfState {
  ConfType confType = 1;
  bool show = 2;
  FieldValue fieldValue = 3;
  ConfValue confValue = 4;
}

message PlayLimit {
  PlayLimitCode code = 1;
  string message = 2;
  string subMessage = 3;
  ButtonStyle button = 4;
}

message PlayURLReply {
  uint32 quality = 1;
  string format = 2;
  uint64 timelength = 3;
  uint32 videoCodecid = 4;
  uint32 fnver = 5;
  uint32 fnval = 6;
  bool videoProject = 7;
  repeated ResponseUrl durl = 8;
  ResponseDash dash = 9;
  int32 noRexcode = 10;
  UpgradeLimit upgradeLimit = 11;
  repeated FormatDescription supportFormats = 12;
  VideoType type = 13;
  VipRisk vipRisk = 14;
}

message PlayURLReq {
  int64 aid = 1;
  int64 cid = 2;
  int64 qn = 3;
  int32 fnver = 4;
  int32 fnval = 5;
  uint32 download = 6;
  int32 forceHost = 7;
  bool fourk = 8;
  string spmid = 9;
  string fromSpmid = 10;
}

message PlayViewReply {
  VideoInfo videoInfo = 1;
  PlayAbilityConf playConf = 2;
  UpgradeLimit upgradeLimit = 3;
  Chronos chronos = 4;
  PlayArcConf playArc = 5;
  Event event = 6;
  AB ab = 7;
  PlayLimit playLimit = 8;
  ViewInfo viewInfo = 9;
  PlayArc arc = 10;
}

message PlayViewReq {
  int64 aid = 1;
  int64 cid = 2;
  int64 qn = 3;
  int32 fnver = 4;
  int32 fnval = 5;
  uint32 download = 6;
  int32 forceHost = 7;
  bool fourk = 8;
  string spmid = 9;
  string fromSpmid = 10;
  int32 teenagersMode = 11;
  CodeType preferCodecType = 12;
  Business business = 13;
  int64 voiceBalance = 14;
}

message ProjectReply {
  PlayURLReply project = 1;
}

message ProjectReq {
  int64 aid = 1;
  int64 cid = 2;
  int64 qn = 3;
  int32 fnver = 4;
  int32 fnval = 5;
  uint32 download = 6;
  int32 forceHost = 7;
  bool fourk = 8;
  string spmid = 9;
  string fromSpmid = 10;
  int32 protocol = 11;
  int32 deviceType = 12;
}

message PromptBar {
  TextInfo title = 1;
  TextInfo subTitle = 2;
  string subTitleIcon = 3;
  string bgImage = 4;
  repeated ButtonInfo button = 5;
  Report report = 6;
}

message Report {
  string showEventId = 1;
  string clickEventId = 2;
  string extends = 3;
}

message ResponseDash {
  repeated DashItem video = 1;
  repeated DashItem audio = 2;
}

message ResponseUrl {
  uint32 order = 1;
  uint64 length = 2;
  uint64 size = 3;
  string url = 4;
  repeated string backupUrl = 5;
  string md5 = 6;
  uint32 quality = 7;
}

message Scheme {
  enum ActionType {
    UNKNOWN = 0;
    SHOW_TOAST = 1;
  }

  ActionType actionType = 1;
  string toast = 2;
}

message SegmentVideo {
  repeated ResponseUrl segment = 1;
}

message Shake {
  string file = 1;
}

message Stream {
  StreamInfo streamInfo = 1;

  oneof content {
    DashVideo dashVideo = 2;
    SegmentVideo segmentVideo = 3;
    MultiDashVideo multiDashVideo = 4;
  }
}

message StreamInfo {
  uint32 quality = 1;
  string format = 2;
  string description = 3;
  PlayErr errCode = 4;
  StreamLimit limit = 5;
  bool needVip = 6;
  bool needLogin = 7;
  bool intact = 8;
  bool noRexcode = 9;
  int64 attribute = 10;
  string newDescription = 11;
  string displayDesc = 12;
  string superscript = 13;
  bool vipFree = 14;
  string subtitle = 15;
  Scheme scheme = 16;
  bool supportDrm = 17;
  bool hasPreview = 18;
  uint64 extendAttribute = 19;
}

message StreamLimit {
  string title = 1;
  string uri = 2;
  string msg = 3;
}

message TextInfo {
  string text = 1;
  string textColor = 2;
  string textColorNight = 3;
}

message UpgradeButton {
  string title = 1;
  string link = 2;
}

message UpgradeLimit {
  int32 code = 1;
  string message = 2;
  string image = 3;
  UpgradeButton button = 4;
}

message VideoInfo {
  uint32 quality = 1;
  string format = 2;
  uint64 timelength = 3;
  uint32 videoCodecid = 4;
  repeated Stream streamList = 5;
  repeated DashItem dashAudio = 6;
  DolbyItem dolby = 7;
  VolumeInfo volume = 8;
  LossLessItem lossLessItem = 9;
  uint64 mainTimelength = 10;
}

message ViewInfo {
  map<string, Dialog> dialogMap = 1;
  PromptBar promptBar = 2;
  repeated ComprehensiveToast toasts = 3;
}

message VipRisk {
  bool allow = 1;
  int64 type = 2;
  int64 reason = 3;
  int64 deviceStatus = 4;
}

message VolumeInfo {
  double measuredI = 1;
  double measuredLra = 2;
  double measuredTp = 3;
  double measuredThreshold = 4;
  double targetOffset = 5;
  double targetI = 6;
  double targetTp = 7;
  map<string, string> multiSceneArgs = 8;
}

service PlayURL {
  rpc PlayConfEdit(PlayConfEditReq) returns (PlayConfEditReply);
  rpc PlayConf(PlayConfReq) returns (PlayConfReply);
  rpc PlayURL(PlayURLReq) returns (PlayURLReply);
  rpc PlayView(PlayViewReq) returns (PlayViewReply);
  rpc Project(ProjectReq) returns (ProjectReply);
}
