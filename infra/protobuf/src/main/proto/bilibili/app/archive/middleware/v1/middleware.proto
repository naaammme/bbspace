syntax = "proto3";

package bilibili.app.archive.middleware.v1;

option java_multiple_files = true;
option java_package = "com.bapis.bilibili.app.archive.middleware.v1";
option optimize_for = LITE_RUNTIME;

enum QnPolicy {
  QN_POLICY_DEFAULT = 0;
  QN_POLICY_AUTO_QN_ENABLE = 1;
}

message PlayerArgs {
  int64 qn = 1;
  int64 fnver = 2;
  int64 fnval = 3;
  int64 forceHost = 4;
  int64 voiceBalance = 5;
  QnPolicy qnPolicy = 6;
  int64 clientAttr = 7;
  map<string, string> extraContent = 8;
}
