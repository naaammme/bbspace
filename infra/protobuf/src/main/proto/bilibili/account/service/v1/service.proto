syntax = "proto3";

package bilibili.account.service.v1;

option java_multiple_files = true;
option java_package = "com.bapis.bilibili.account.service.v1";
option optimize_for = LITE_RUNTIME;

enum RenderSchemeEnum {
  Default = 0;
  Colorful = 1;
}

message Color {
  string colorDay = 1;
  string colorNight = 2;
}

message ColorsInfo {
  repeated int64 colorIds = 1;
  repeated Color color = 2;
}

message NameRender {
  RenderSchemeEnum renderScheme = 1;
  ColorsInfo colorsInfo = 2;
}
