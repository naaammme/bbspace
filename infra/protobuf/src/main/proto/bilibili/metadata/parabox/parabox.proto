syntax = "proto3";
package com.bapis.bilibili.metadata.parabox;
option java_package = "com.bapis.bilibili.metadata.parabox";
option java_multiple_files = true;
// Exp 实验配置
message Exp {
    int64 id = 1;      // 实验ID
    int32 bucket = 2;  // 分桶编号
}
// Exps 实验配置列表
message Exps {
    repeated Exp exps = 1;  // 实验列表
}