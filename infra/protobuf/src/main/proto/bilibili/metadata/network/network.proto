syntax = "proto3";

package bilibili.metadata.network;

// 网络类型
enum NetworkType {
    NT_UNKNOWN = 0;
    WIFI       = 1;
    CELLULAR   = 2;
    OFFLINE    = 3;
    OTHERNET   = 4;
    ETHERNET   = 5;
}
// 蜂窝网络类型
enum CellularType {
    C_NONE = 0;
    C_2G   = 1;
    C_3G   = 2;
    C_4G   = 3;
    C_5G   = 4;
}
// 免流类型
enum TFType {
    TF_UNKNOWN = 0;
    U_CARD     = 1; // 联通免流卡
    U_PKG      = 2; // 联通免流包
    C_CARD     = 3; // 电信免流卡
    C_PKG      = 4; // 电信免流包
    T_CARD     = 5; // 移动免流卡
    T_PKG      = 6; // 移动免流包
}
// 网络质量
message NetQuality {
    float success_rate    = 1; // 成功率
    int32 speed           = 2; // 网速
    int64 speed_timestamp = 3; // 测速时间戳
    int32 net_type        = 4 [deprecated = true]; // 网络类型(已废弃)
}
// 网络信息
message Network {
    NetworkType  type     = 1; // 网络类型
    TFType       tf       = 2; // 免流类型
    string       oid      = 3; // 运营商ID
    CellularType cellular = 4; // 蜂窝网络类型
    NetQuality   quality  = 5; // 网络质量
}